<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Persona Router</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f5f5f5; }
        .chat-container { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 80%; line-height: 1.5; }
        .user-message { background: #007bff; color: white; align-self: flex-end; }
        .bot-message { background: #e9ecef; color: black; align-self: flex-start; }
        .meta-data { font-size: 0.8em; color: #666; margin-bottom: 5px; font-weight: bold; }
        .input-area { display: flex; margin-top: 20px; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <h2>🤖 Multi-Persona AI Assistant</h2>
    <p>Try asking about code, data, writing, or your career. (Use `@code` etc. to force a route).</p>
    
    <div class="chat-container" id="chat-box"></div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            // Simple text encoding for display to prevent basic XSS from user input reflecting back
            const safeMessage = message.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            appendMessage('user', safeMessage);
            inputField.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // Format the meta data string (Intent & Confidence)
                const metaString = `[Route: ${data.intent.toUpperCase()} | Confidence: ${(data.confidence * 100).toFixed(0)}%]`;
                
                // Extremely basic parsing for standard text responses.
                // Note: since LLM outputs could contain markdown/HTML,
                // a robust implementation would use something like marked.js or DOMPurify here.
                const safeResponseText = data.response
                   .replace(/</g, "&lt;")
                   .replace(/>/g, "&gt;");

                appendMessage('bot', safeResponseText, metaString);

            } catch (error) {
                appendMessage('bot', 'Sorry, there was an error processing your request.');
            }
        }

        function appendMessage(sender, text, meta = '') {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            
            if (meta && sender === 'bot') {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta-data';
                metaDiv.innerText = meta;
                msgDiv.appendChild(metaDiv);
            }
            
            // Using innerHTML allows for <br> support if responses have newlines, 
            // but we must be careful about XSS.
            const contentDiv = document.createElement('div');
            // convert newlines to <br>
            contentDiv.innerHTML = text.replace(/\n/g, '<br>');
            msgDiv.appendChild(contentDiv);

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
